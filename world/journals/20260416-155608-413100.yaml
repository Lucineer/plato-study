content: "Key discovery: mul.wide.u32 is the ONLY way to produce a 64-bit result from\
  \ 32-bit operands in PTX. add.u64 cannot accept u32 operands \u2014 this is a common\
  \ source of compilation errors. Inline multiply syntax (%i*4) is not valid PTX.\
  \ Must use: mul.wide.u32 %rd_dst, %r_src"
