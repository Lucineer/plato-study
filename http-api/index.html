<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLATO Study</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --text: #e0e0e0;
    --dim: #666680;
    --accent: #7c6ff7;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
  }
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  
  /* Status bar */
  #statusbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 16px; display: flex; align-items: center; gap: 16px; font-size: 12px; flex-shrink: 0; }
  #statusbar .room { color: var(--accent); font-weight: bold; }
  #statusbar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  #statusbar .meta { color: var(--dim); }
  #statusbar .meta span { margin-right: 12px; }

  /* Main layout */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .nav-section { padding: 8px; }
  .nav-section h3 { font-size: 10px; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; margin-bottom: 4px; padding: 4px 8px; }
  .nav-item { padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .nav-item:hover { background: rgba(124,111,247,0.1); }
  .nav-item.active { background: rgba(124,111,247,0.2); color: var(--accent); }
  .nav-item .badge { font-size: 10px; background: var(--border); padding: 1px 6px; border-radius: 8px; color: var(--dim); margin-left: auto; }
  .expert-item { padding: 8px 12px; border-radius: 4px; cursor: pointer; }
  .expert-item:hover { background: rgba(74,222,128,0.05); }
  .expert-name { font-size: 13px; color: var(--green); }
  .expert-meta { font-size: 11px; color: var(--dim); margin-top: 2px; }
  #expert-list { flex: 1; overflow-y: auto; }

  /* Chat area */
  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.system { align-self: center; color: var(--dim); font-size: 12px; background: rgba(255,255,255,0.03); }
  .msg.user { align-self: flex-end; background: var(--accent); color: white; }
  .msg.result { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .msg.error { align-self: flex-start; background: rgba(248,113,113,0.1); border: 1px solid var(--red); color: var(--red); }
  .msg.journal { align-self: flex-start; background: rgba(74,222,128,0.05); border-left: 3px solid var(--green); }
  .msg .label { font-size: 10px; color: var(--dim); margin-bottom: 4px; }
  .msg .label strong { color: var(--accent); }

  /* Input */
  #input-area { border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 8px; flex-shrink: 0; }
  #input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--dim); }
  #send { background: var(--accent); color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; }
  #send:hover { opacity: 0.9; }

  /* Quick actions */
  #quick-actions { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
  .quick-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: 11px; color: var(--dim); cursor: pointer; font-family: inherit; }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="statusbar">
  <div class="dot" id="conn-dot"></div>
  <div class="room">PLATO Study</div>
  <div class="meta">
    <span id="meta-experts">0 experts</span>
    <span id="meta-journal">0 entries</span>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div class="nav-section">
      <h3>Navigation</h3>
      <div class="nav-item active" onclick="showView('chat')">💬 Chat</div>
      <div class="nav-item" onclick="showView('experts')">🧠 Experts</div>
      <div class="nav-item" onclick="showView('journal')">📖 Journal</div>
      <div class="nav-item" onclick="refresh()">🔄 Refresh</div>
    </div>
    <div class="nav-section">
      <h3>Experts</h3>
      <div id="expert-list"></div>
    </div>
  </div>

  <div id="chat">
    <div id="messages"></div>
    <div id="quick-actions">
      <button class="quick-btn" onclick="quickSpawn()">🧠 Spawn Expert</button>
      <button class="quick-btn" onclick="quickJournal()">📝 Journal Entry</button>
      <button class="quick-btn" onclick="quickCheckpoint()">📌 Checkpoint</button>
      <button class="quick-btn" onclick="quickStatus()">📊 Status</button>
      <button class="quick-btn" onclick="quickHelp()">❓ Help</button>
    </div>
    <div id="input-area">
      <input id="input" placeholder="Type a command... (try /help)" autofocus>
      <button id="send" onclick="handleInput()">Send</button>
    </div>
  </div>
</div>

<script>
const API = '';
let experts = [];
let currentExpert = null;
let state = { expertName: '', topic: '', brief: '', model: '' };

const input = document.getElementById('input');
input.addEventListener('keydown', e => { if (e.key === 'Enter') handleInput(); });

function msg(text, type='system', label='') {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  if (label) div.innerHTML = `<div class="label">${label}</div>`;
  div.appendChild(document.createTextNode(text));
  const messages = document.getElementById('messages');
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function api(path, body=null) {
  const opts = body ? { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) } : {};
  const r = await fetch(API + path, opts);
  return r.json();
}

async function refresh() {
  try {
    const [statusData, expertsData, journalData] = await Promise.all([
      api('/status'), api('/experts'), api('/journal')
    ]);
    experts = expertsData.experts || [];
    updateSidebar(experts);
    document.getElementById('meta-experts').textContent = experts.length + ' experts';
    document.getElementById('meta-journal').textContent = (journalData.entries || []).length + ' entries';
    document.getElementById('conn-dot').style.background = 'var(--green)';
  } catch(e) {
    document.getElementById('conn-dot').style.background = 'var(--red)';
  }
}

function updateSidebar(experts) {
  const list = document.getElementById('expert-list');
  list.innerHTML = '';
  experts.forEach(e => {
    const div = document.createElement('div');
    div.className = 'expert-item' + (currentExpert === e.id ? ' active' : '');
    div.innerHTML = `<div class="expert-name">${e.name}</div><div class="expert-meta">${e.topic} · ${e.status} · ${e.rounds_completed}/${e.max_rounds}</div>`;
    div.onclick = () => { currentExpert = e.id; state.expertName = e.name; updateSidebar(experts); };
    list.appendChild(div);
  });
}

function showView(view) {
  document.querySelectorAll('.nav-item').forEach((n, i) => {
    n.classList.toggle('active', (view === 'chat' && i === 0) || (view === 'experts' && i === 1) || (view === 'journal' && i === 2));
  });
  if (view === 'journal') loadJournal();
  if (view === 'experts') loadExperts();
}

async function loadJournal() {
  const data = await api('/journal');
  const entries = data.entries || [];
  document.getElementById('messages').innerHTML = '';
  if (!entries.length) { msg('No journal entries yet.', 'system'); return; }
  entries.reverse().forEach(e => {
    const typeClass = {note:'', finding:'journal', question:'', redirect:'', 'dead-end':'error'}[e.type] || '';
    msg(`[${e.type}] ${e.content}`, typeClass, `${e.expert_id} · ${new Date(e.timestamp).toLocaleTimeString()}`);
  });
}

async function loadExperts() {
  const data = await api('/experts');
  const exs = data.experts || [];
  document.getElementById('messages').innerHTML = '';
  if (!exs.length) { msg('No experts spawned yet.', 'system'); return; }
  exs.forEach(e => {
    msg(`${e.name} — ${e.topic}\nModel: ${e.model} | Budget: ${e.budget_tokens} | Rounds: ${e.rounds_completed}/${e.max_rounds}\nStatus: ${e.status} | Checkpoints: ${e.checkpoints.length}\nBranch: ${e.branch}`, 'result', e.id);
  });
}

// Quick action flows (multi-step via input prompts)
function quickSpawn() {
  state.step = 'spawn_name';
  msg('Spawning new expert. What should we call them?', 'system');
  input.placeholder = 'Expert name (e.g. ptx-researcher)';
  input.focus();
}

function quickJournal() {
  if (!currentExpert) { msg('Select an expert from the sidebar first, or type the expert ID.', 'system'); return; }
  state.step = 'journal_content';
  msg(`Journal entry for ${currentExpert}. Type your entry:`, 'system');
  input.placeholder = 'Your research note, finding, or question...';
  input.focus();
}

function quickCheckpoint() {
  if (!currentExpert) { msg('Select an expert first.', 'system'); return; }
  state.step = 'checkpoint_label';
  msg(`Checkpoint for ${currentExpert}. Enter a label:`, 'system');
  input.placeholder = 'Checkpoint label (e.g. good-progress, before-pivot)';
  input.focus();
}

async function quickStatus() {
  const data = await api('/status');
  msg(JSON.stringify(data, null, 2), 'result', 'Room Status');
}

function quickHelp() {
  msg(`PLATO Study — Commands
─────────────────────────────
/spawn <name> <topic>        Spawn expert
/brief <text>                Set brief for next spawn
/model <model>               Set model for next spawn
/journal <text>              Post journal entry
/checkpoint <label>          Bookmark current state
/rewind <sha_or_label>       Reset to checkpoint
/fork <old> <new>            Fork from checkpoint
/status                      Room status
/experts                     List experts
/journal-list                View journal
/select <expert_id>          Select active expert
/help                        This message
─────────────────────────────
Or just type naturally — the UI will figure it out.`, 'system');
}

async function handleInput() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.placeholder = 'Type a command... (try /help)';

  // Multi-step flows
  if (state.step === 'spawn_name') {
    state.expertName = text;
    state.step = 'spawn_topic';
    msg(`Expert "${text}". What topic should they research?`, 'system');
    input.placeholder = 'Research topic';
    return;
  }
  if (state.step === 'spawn_topic') {
    state.topic = text;
    state.step = 'spawn_brief';
    msg('Any additional instructions for the brief? (empty for default)', 'system');
    input.placeholder = 'Brief (optional, enter to skip)';
    return;
  }
  if (state.step === 'spawn_brief') {
    state.brief = text;
    state.step = null;
    input.placeholder = 'Type a command... (try /help)';
    msg(`Spawning ${state.expertName}...`, 'system');
    const cmd = {
      agent: 'admin', action: 'spawn',
      expert: state.expertName, topic: state.topic,
      brief: state.brief, model: state.model || undefined,
      budget_tokens: 50000, max_rounds: 20,
    };
    const r = await api('/command', cmd);
    if (r.result && r.result.passed) {
      msg(`✓ ${state.expertName} spawned (${r.result.expert_id})\nBranch: ${r.result.branch}`, 'journal', 'Expert Spawned');
      currentExpert = r.result.expert_id;
      refresh();
    } else {
      msg(`Spawn failed: ${JSON.stringify(r)}`, 'error');
    }
    return;
  }
  if (state.step === 'journal_content') {
    state.step = null;
    input.placeholder = 'Type a command... (try /help)';
    msg(text, 'journal', `You → ${currentExpert}`);
    const r = await api('/command', { agent: 'admin', action: 'journal', expert_id: currentExpert, type: 'note', content: text });
    refresh();
    return;
  }
  if (state.step === 'checkpoint_label') {
    state.step = null;
    input.placeholder = 'Type a command... (try /help)';
    const r = await api('/command', { agent: 'admin', action: 'checkpoint', expert_id: currentExpert, label: text });
    msg(r.result && r.result.passed ? `✓ Checkpoint "${text}" saved at ${r.result.sha?.slice(0,8)}` : `Failed: ${JSON.stringify(r)}`, r.result?.passed ? 'journal' : 'error');
    refresh();
    return;
  }

  // Slash commands
  msg(text, 'user', 'You');

  if (text.startsWith('/')) {
    const parts = text.slice(1).split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1).join(' ');

    if (cmd === 'help') { quickHelp(); return; }
    if (cmd === 'status') { quickStatus(); return; }
    if (cmd === 'experts') { loadExperts(); return; }
    if (cmd === 'journal-list') { loadJournal(); return; }
    if (cmd === 'spawn' && args) {
      // /spawn name topic
      const sargs = args.split(/\s+/);
      state.expertName = sargs[0];
      state.topic = sargs.slice(1).join(' ') || 'General research';
      state.brief = '';
      state.step = null;
      const r = await api('/command', { agent: 'admin', action: 'spawn', expert: state.expertName, topic: state.topic, brief: '', budget_tokens: 50000, max_rounds: 20 });
      msg(r.result?.passed ? `✓ ${state.expertName} spawned` : `Failed: ${JSON.stringify(r)}`, r.result?.passed ? 'journal' : 'error');
      if (r.result?.expert_id) currentExpert = r.result.expert_id;
      refresh();
      return;
    }
    if (cmd === 'journal' && args) {
      if (!currentExpert) { msg('Select an expert first.', 'system'); return; }
      const r = await api('/command', { agent: 'admin', action: 'journal', expert_id: currentExpert, type: 'note', content: args });
      refresh();
      return;
    }
    if (cmd === 'select' && args) {
      currentExpert = args;
      msg(`Selected: ${args}`, 'system');
      refresh();
      return;
    }
    if (cmd === 'model') {
      state.model = args;
      msg(`Default model set to: ${args}`, 'system');
      return;
    }
    if (cmd === 'checkpoint') {
      if (!currentExpert) { msg('Select an expert first.', 'system'); return; }
      const r = await api('/command', { agent: 'admin', action: 'checkpoint', expert_id: currentExpert, label: args || undefined });
      msg(r.result?.passed ? `✓ Checkpoint saved` : `Failed`, r.result?.passed ? 'journal' : 'error');
      refresh();
      return;
    }
    msg(`Unknown command: /${cmd}. Type /help for commands.`, 'error');
  } else {
    // Natural text → journal entry if expert selected
    if (currentExpert) {
      const r = await api('/command', { agent: 'admin', action: 'journal', expert_id: currentExpert, type: 'note', content: text });
      refresh();
    } else {
      msg('No expert selected. Type /spawn <name> <topic> to start, or /help.', 'system');
    }
  }
}

// Boot
refresh();
msg('Welcome to PLATO Study.', 'system');
msg('Type /help for commands, or click a quick action below.', 'system');
quickHelp();
</script>
</body>
</html>
